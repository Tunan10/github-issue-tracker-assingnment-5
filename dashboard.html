<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <title>Issue Tracker||dev-Tunan</title>
</head>

<body>

  <header class="shadow-md">
    <nav class="flex justify-between p-4 items-center w-11/12 mx-auto">

      <div class="flex items-center gap-3">
        <img class="w-9" src="./assets/github-logo.png">
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-2">

        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" required placeholder="Search" />
        </label>

        <button onclick="searchIssue()" class="btn btn-primary px-3">
          Search
        </button>

        <button onclick="newIssue()" class="btn btn-primary">+ New Issue</button>

      </div>

    </nav>
  </header>


  <section>

    <div class="flex gap-2 p-4 mt-14 w-10/12 mx-auto shadow-xl items-center border border-slate-200 rounded-lg mb-5">

      <button id="all-btn" onclick="toggleStyle('all-btn'); filterIssues('all')" class="btn btn-primary px-8">
        All
      </button>

      <button id="open-btn" onclick="toggleStyle('open-btn'); filterIssues('open')" class="btn btn-primary px-7">
        Open
      </button>

      <button id="closed-btn" onclick="toggleStyle('closed-btn'); filterIssues('closed');" class="btn btn-primary px-7">
        Closed
      </button>

    </div>


    <div
      class="p-8 border-b border-slate-200 flex flex-wrap justify-between items-center gap-6 w-10/12 mx-auto shadow-lg">

      <div class="flex items-center gap-5 ">

        <div class=" w-12 h-12 bg-violet-100 rounded-full flex items-center justify-center text-[#4f11ff]">
          <img src="./assets/Aperture.png" class="w-6 h-6">
        </div>

        <div>
          <h2 id="issue-count" class="text-2xl font-bold text-slate-800">0 Issues</h2>
          <p class="text-slate-400 text-sm font-medium mt-0.5">
            Track and manage your project issues
          </p>
        </div>

      </div>

      <div class="flex gap-8 font-semibold text-sm">

        <span class="flex items-center gap-2.5 text-slate-700">
          <div class="w-3 h-3 rounded-full bg-emerald-500"></div> Open
        </span>

        <span class="flex items-center gap-2.5 text-slate-700">
          <div class="w-3 h-3 rounded-full bg-violet-500"></div> Closed
        </span>

      </div>

    </div>


    <div id="issuesContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4 w-11/12 lg:w-10/12 mx-auto">




  </section>

  <div id="modal"
    class="hidden fixed top-0 left-0 w-full h-full bg-gray-200/90 bg-opacity-50 flex items-center justify-center">

    <div class="bg-white p-6 w-96">

      <h2 id="modalTitle" class="text-xl font-bold"></h2>

      <p id="modalDesc" class="mt-2"></p>

      <button onclick="closeModal()" class="mt-4 bg-red-500 text-white px-4 py-1">
        Close
      </button>

    </div>

  </div>

  <script src="./script/dashboard.js"></script>

</body>

</html>
