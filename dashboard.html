<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <title>Issue Tracker||dev-Tunan</title>
</head>

<body>

  <header class="shadow-md">
    <nav class="flex justify-between p-4 items-center w-11/12 mx-auto">

      <div class="flex items-center gap-3">
        <img class="w-9" src="./assets/github-logo.png">
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-2">

        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input id="search-input" type="search" required placeholder="Search" />
        </label>

        <button onclick="searchIssue()" class="btn btn-primary px-3">
          Search
        </button>

        <button onclick="newIssue()" class="btn btn-primary">+ New Issue</button>

      </div>

    </nav>
  </header>





</body>

</html>
