<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Issue Tracker||dev-Tunan</title>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded shadow w-96">

    <img class="w-6/12[100px] mx-auto h-[100px]" src="./assets/github-logo.png" alt="">

    <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>
    <p class="text-center text-gray-500 mb-4">Sign in to manage your issues</p>


    <p class="mt-8 font-semibold">Username</p>
    <input id="username" class="border border-gray-300 rounded-lg w-full p-2" placeholder="Enter Username">
    <p class="text-violet-700 mb-2">Default:admin</p>

    <input id="password" type="password" class="border border-gray-300 rounded-lg w-full p-2 "
      placeholder="Enter Password">
    <p class="text-violet-700 mb-2">Default:admin123</p>

    <button onclick="login()" class=" w-full p-2 rounded btn btn-primary text-lg ">
      Sign In
    </button>

    <div class="flex items-center my-6">
      <div class="flex-grow border-t border-gray-300"></div>
      <span class="mx-4 text-gray-500 font-medium">OR</span>
      <div class="flex-grow border-t border-gray-300"></div>
    </div>
    <p class="text-center text-gray-500">Demo Credentials: </p>
    <div class="bg-[#F8FAFC] w-full p-2 mt-3 flex flex-col  items-center justify-center pb-5 pt-5 rounded-lg">
      <h3 class="font-semibold">Username:<span class="font-light">admin</span>
      </h3>
      <h3 class="font-semibold">Password: <span class="font-light">admin123</span>
      </h3>

    </div>


  </div>

  <script src="./script/index.js"></script>
</body>

</html>
